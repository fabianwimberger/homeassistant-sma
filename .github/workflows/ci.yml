name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    brackets: [main]

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check custom_components/sma_meter tests/

      - name: Format check with ruff
        run: ruff format --check custom_components/sma_meter tests/

      - name: Type check with mypy
        run: mypy custom_components/sma_meter --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install .
          pip install -r requirements_test.txt

      - name: Run tests
        run: pytest tests/ -v --cov=custom_components/sma_meter --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
